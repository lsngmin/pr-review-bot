spring.application.name=pr-review-bot
openai.api-key=${OPENAI_API_KEY:}
anthropic.api-key=${ANTHROPIC_API_KEY:}
github.app.id=${GH_APP_ID:}
github.app.installation-id=${GH_APP_INSTALLATION_ID:}
